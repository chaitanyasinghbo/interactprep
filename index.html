<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interact / Rotary Officer Prep · Service Above Self</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbf8f1;
    --panel: #ffffff;
    --line: #e7e2d3;
    --line-soft: #f0ebda;
    --ink: #0b1730;
    --ink-soft: #475569;
    --ink-mute: #94a3b8;
    --rblue: #17458f;     /* royal Rotary blue */
    --rblue-bg: #ecf2fc;
    --rblue-line: #c7d8f5;
    --gold: #b8860b;       /* azure-gold pair */
    --gold-bg: #fdf7e3;
    --gold-line: #ecdba1;
    --cran: #b32850;       /* cranberry — areas of focus */
    --cran-bg: #fdedf2;
    --cran-line: #f3c4d3;
    --emer: #0f7a52;
    --emer-bg: #e9f7f0;
    --emer-line: #b6e2cd;
    --sky:  #1e6fb8;
    --sky-bg: #e8f1fa;
    --sky-line: #b9d6ef;
    --plum: #6b3ea8;
    --plum-bg: #f1ebfa;
    --plum-line: #d4c1ec;
    --warn: #b45309;
    --warn-bg: #fffbeb;
    --green: #15803d;
    --red:   #b91c1c;
    --shadow: 0 1px 2px rgba(15,23,42,.04), 0 4px 18px rgba(15,23,42,.06);
    --radius: 14px;
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 14.5px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .serif { font-family: 'Source Serif 4', Georgia, serif; }

  /* ── Top bar ─────────────────────────────────────────────────── */
  header.top {
    position: sticky; top: 0; z-index: 30;
    background: rgba(251,248,241,.94);
    backdrop-filter: saturate(160%) blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .top-row { max-width: 1380px; margin: 0 auto; padding: 14px 28px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .brand { font-weight: 800; font-size: 18px; letter-spacing: -0.01em; }
  .brand .wheel {
    display: inline-block; width: 14px; height: 14px;
    background: radial-gradient(circle, var(--gold) 30%, var(--rblue) 31%, var(--rblue) 100%);
    border-radius: 50%; margin-right: 10px; vertical-align: -2px;
    box-shadow: inset 0 0 0 2px var(--gold);
  }
  .sub { color: var(--ink-soft); font-size: 12.5px; }
  .spacer { flex: 1; }
  .search { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px; min-width: 260px; }
  .search input { border: 0; outline: 0; background: transparent; font-family: inherit; font-size: 13.5px; flex: 1; color: var(--ink); }

  .tabs { max-width: 1380px; margin: 0 auto; padding: 0 28px 12px; display: flex; gap: 4px; flex-wrap: wrap; }
  .tab {
    padding: 10px 16px; cursor: pointer; font-weight: 600; font-size: 13.5px;
    color: var(--ink-soft); border-bottom: 2px solid transparent; transition: all .12s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--rblue); border-bottom-color: var(--rblue); }
  .tab .count { font-size: 11px; color: var(--ink-mute); margin-left: 4px; font-weight: 500; }

  .chips-row { max-width: 1380px; margin: 0 auto; padding: 0 28px 14px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    border: 1px solid var(--line); background: white; padding: 6px 12px;
    border-radius: 999px; font-size: 12.5px; font-weight: 600;
    color: var(--ink-soft); cursor: pointer; transition: all .12s ease; user-select: none;
  }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active { background: var(--ink); color: white; border-color: var(--ink); }
  .chip-label { font-size: 11px; font-weight: 700; color: var(--ink-mute); letter-spacing: 0.06em; text-transform: uppercase; margin-right: 4px; }

  /* ── Main ────────────────────────────────────────────────────── */
  main { max-width: 1380px; margin: 0 auto; padding: 18px 28px 80px; }
  .summary-bar { display: flex; gap: 14px; align-items: baseline; margin-bottom: 18px; flex-wrap: wrap; }
  .summary-bar h2 { margin: 0; font-size: 22px; letter-spacing: -0.015em; }
  .summary-bar .sublabel { color: var(--ink-soft); font-size: 13px; }

  /* Card grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px 16px 14px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 8px;
    transition: transform .12s ease, box-shadow .12s ease;
    position: relative; overflow: hidden;
  }
  .card:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(15,23,42,.05), 0 12px 28px rgba(15,23,42,.08); }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--ink-mute);
  }
  .card.cat-identity::before { background: var(--rblue); }
  .card.cat-focus::before    { background: var(--cran); }
  .card.cat-service::before  { background: var(--emer); }
  .card.cat-test::before     { background: var(--gold); }
  .card.cat-symbol::before   { background: var(--gold); }
  .card.cat-interact::before { background: var(--sky); }
  .card.cat-people::before   { background: #7a5a2a; }
  .card.cat-history::before  { background: #7a5a2a; }
  .card.cat-program::before  { background: var(--plum); }
  .card.cat-quote::before    { background: var(--gold); }
  .card.cat-handbook::before { background: #0a8a55; }

  .card h3 { margin: 0; font-size: 15.5px; line-height: 1.35; letter-spacing: -0.005em; }
  .card .meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .tag {
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em;
    padding: 2px 7px; border-radius: 5px; text-transform: uppercase;
  }
  .tag.identity { background: var(--rblue-bg); color: var(--rblue); }
  .tag.focus    { background: var(--cran-bg);  color: var(--cran); }
  .tag.service  { background: var(--emer-bg);  color: var(--emer); }
  .tag.test     { background: var(--gold-bg);  color: var(--gold); }
  .tag.symbol   { background: var(--gold-bg);  color: var(--gold); }
  .tag.interact { background: var(--sky-bg);   color: var(--sky); }
  .tag.people   { background: #f3eadb;         color: #7a5a2a; }
  .tag.history  { background: #f3eadb;         color: #7a5a2a; }
  .tag.program  { background: var(--plum-bg);  color: var(--plum); }
  .tag.quote    { background: var(--gold-bg);  color: var(--gold); }
  .tag.handbook { background: #e6f5ed;         color: #0a8a55; }
  .card.cat-debate::before    { background: var(--plum); }
  .card.cat-interview::before { background: var(--rblue); }
  .tag.debate    { background: var(--plum-bg);  color: var(--plum); }
  .tag.interview { background: var(--rblue-bg); color: var(--rblue); }
  .tag.role      { background: #f1f5f9;         color: var(--ink-soft); }
  .debate-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .debate-side { border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px 12px; }
  .debate-side.for     { border-left: 3px solid var(--emer); background: var(--emer-bg); }
  .debate-side.against { border-left: 3px solid var(--cran); background: var(--cran-bg); }
  .debate-side h5 { margin: 0 0 6px; font-size: 10.5px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; }
  .debate-side.for h5     { color: var(--emer); }
  .debate-side.against h5 { color: var(--cran); }
  .debate-side ul { margin: 0; padding-left: 16px; font-size: 12.5px; color: var(--ink); line-height: 1.5; }
  .debate-side li { margin-bottom: 4px; }
  .section-divider {
    margin: 26px 0 14px; padding-bottom: 8px;
    border-bottom: 2px solid var(--line);
    font-size: 13px; font-weight: 800;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink);
  }
  .section-divider .sublabel {
    font-weight: 500; letter-spacing: 0;
    text-transform: none; color: var(--ink-soft);
    font-size: 13px; margin-left: 6px;
  }
  .section-divider:first-of-type { margin-top: 8px; }
  @media (max-width: 740px) {
    .debate-split { grid-template-columns: 1fr; }
  }
  .tag.diff-easy     { background: #ecfdf5; color: #047857; }
  .tag.diff-medium   { background: #eff6ff; color: #1d4ed8; }
  .tag.diff-hard     { background: #fef3c7; color: #92400e; }
  .tag.diff-officer  { background: #fce7f3; color: #be185d; }
  .tag.type-mcq      { background: #f1f5f9; color: var(--ink-soft); }
  .tag.type-fr       { background: #eef2ff; color: #4338ca; }
  .tag.year { background: #f1f5f9; color: var(--ink-soft); }

  .field { font-size: 13.5px; }
  .field .lbl {
    display: inline-block; min-width: 76px; color: var(--ink-mute);
    font-weight: 700; font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase;
    margin-right: 6px; vertical-align: top;
  }
  .field .val { color: var(--ink); }
  .field ol, .field ul { margin: 4px 0 0 18px; padding: 0; }
  .field li { margin-bottom: 3px; }

  .card .pull {
    border-left: 3px solid var(--gold); background: var(--gold-bg);
    padding: 8px 10px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 13px; color: #6b4503;
  }
  .card .pull strong { color: var(--warn); }
  .card .related { font-size: 12px; color: var(--ink-soft); }
  .card .verbatim {
    background: linear-gradient(180deg, #fefcf6, #faf7ec);
    border: 1px solid #efe6cc; border-radius: var(--radius-sm);
    padding: 12px 14px; font-family: 'Source Serif 4', Georgia, serif;
    font-size: 14px; line-height: 1.6; color: #1a1305;
  }
  .card .verbatim .lbl-v { display: block; font-family: 'Inter', sans-serif; font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: #b69148; font-weight: 700; margin-bottom: 6px; }

  /* ── Quiz ────────────────────────────────────────────────────── */
  .quiz-setup {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 22px 24px; box-shadow: var(--shadow); max-width: 720px;
  }
  .quiz-setup h3 { margin: 0 0 14px; font-size: 18px; letter-spacing: -0.01em; }
  .quiz-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .quiz-row .qlbl { font-size: 11.5px; font-weight: 700; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.05em; min-width: 90px; }
  .btn {
    background: var(--rblue); color: white; border: 0; padding: 10px 20px;
    border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer;
    transition: opacity .12s;
  }
  .btn:hover { opacity: 0.9; }
  .btn.ghost { background: white; color: var(--ink); border: 1px solid var(--line); }
  .btn.ghost:hover { border-color: var(--ink); }

  .quiz-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 22px 24px; box-shadow: var(--shadow); max-width: 800px;
  }
  .qhead { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .qhead .qnum { font-size: 12px; color: var(--ink-mute); font-weight: 600; }
  .qhead .qprog { flex: 1; height: 6px; background: var(--line-soft); border-radius: 999px; overflow: hidden; }
  .qhead .qprog > div { height: 100%; background: var(--rblue); transition: width .3s; }
  .qhead .qstreak { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
  .qprompt { font-size: 16.5px; line-height: 1.5; margin-bottom: 16px; }
  .qchoices { display: flex; flex-direction: column; gap: 8px; }
  .qchoice {
    border: 1px solid var(--line); background: white; padding: 12px 14px;
    border-radius: 10px; cursor: pointer; font-size: 14px; line-height: 1.45;
    transition: all .12s; text-align: left; display: flex; gap: 10px; align-items: flex-start;
  }
  .qchoice .qletter {
    font-weight: 800; color: var(--ink-mute); min-width: 22px; font-size: 12.5px;
    background: var(--line-soft); border-radius: 5px; padding: 2px 5px; text-align: center;
  }
  .qchoice:hover { border-color: var(--rblue); background: var(--rblue-bg); }
  .qchoice.selected { border-color: var(--rblue); background: var(--rblue-bg); }
  .qchoice.right { border-color: var(--green); background: #ecfdf5; }
  .qchoice.right .qletter { background: var(--green); color: white; }
  .qchoice.wrong { border-color: var(--red); background: #fef2f2; }
  .qchoice.wrong .qletter { background: var(--red); color: white; }
  .qexpl {
    margin-top: 14px; padding: 12px 14px; background: var(--gold-bg);
    border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0;
    font-size: 13.5px; line-height: 1.5; color: #5a3c08;
  }
  .qexpl strong { color: #6b4503; }
  .qactions { margin-top: 18px; display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; }
  .qfr {
    background: var(--line-soft); border: 1px dashed var(--line);
    border-radius: var(--radius-sm); padding: 14px;
    font-size: 13.5px; color: var(--ink-soft);
  }
  .qfr strong { color: var(--ink); }

  .summary-result {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 24px; box-shadow: var(--shadow);
  }
  .summary-result h3 { margin: 0 0 8px; font-size: 22px; }
  .summary-result .score { font-size: 48px; font-weight: 800; color: var(--rblue); letter-spacing: -0.02em; }
  .summary-result .score-sub { color: var(--ink-soft); font-size: 14px; margin-bottom: 18px; }
  .summary-result table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13.5px; }
  .summary-result th, .summary-result td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line-soft); }
  .summary-result th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-mute); }

  /* High-yield list */
  .hy-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 18px 20px; box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .hy-card h3 { margin: 0 0 10px; font-size: 16.5px; color: var(--rblue); }
  .hy-card ol { margin: 0 0 0 22px; padding: 0; }
  .hy-card li { margin-bottom: 7px; line-height: 1.55; }
  .hy-card li strong { color: var(--ink); }

  .placeholder {
    background: var(--panel); border: 2px dashed var(--line);
    border-radius: var(--radius); padding: 40px; text-align: center; color: var(--ink-soft);
  }
  .placeholder h3 { margin: 0 0 8px; color: var(--ink); }

  /* ── Handbook tab ─────────────────────────────────────────────── */
  .hb-section { margin-bottom: 26px; }
  .hb-section > h3 {
    margin: 0 0 12px; font-size: 13px; font-weight: 800;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-mute);
  }
  .hb-banner {
    background: linear-gradient(135deg, #0a8a55 0%, #0d9f63 100%);
    color: white; padding: 22px 24px; border-radius: var(--radius);
    box-shadow: var(--shadow); margin-bottom: 22px;
  }
  .hb-banner h2 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.015em; color: white; }
  .hb-banner .sub { color: rgba(255,255,255,.85); font-size: 13.5px; }
  .hb-banner .pills { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .hb-banner .pill {
    background: rgba(255,255,255,.16); color: white;
    padding: 4px 10px; border-radius: 999px;
    font-size: 11.5px; font-weight: 700; letter-spacing: 0.03em;
  }
  .hb-flow {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  .hb-step {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow);
    position: relative; padding-left: 50px;
  }
  .hb-step .num {
    position: absolute; left: 14px; top: 14px;
    width: 28px; height: 28px; border-radius: 50%;
    background: #0a8a55; color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px;
  }
  .hb-step h4 { margin: 0 0 4px; font-size: 14px; color: #0a8a55; letter-spacing: 0.02em; text-transform: uppercase; }
  .hb-step p { margin: 0; font-size: 13.5px; color: var(--ink-soft); }

  .hb-table-wrap {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow);
  }
  .hb-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .hb-table thead th {
    background: #f3faf6; color: #0a8a55;
    text-align: left; padding: 11px 14px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 1px solid var(--line);
  }
  .hb-table tbody td { padding: 12px 14px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  .hb-table tbody tr:last-child td { border-bottom: 0; }
  .hb-table tbody tr:hover { background: #fafdfb; }
  .hb-table .activity { font-weight: 700; color: var(--ink); }
  .hb-table .objective { color: var(--ink-soft); font-size: 12.5px; margin-top: 3px; }
  .hb-table .hashtag {
    display: inline-block; background: #eef7f3; color: #0a8a55;
    padding: 3px 9px; border-radius: 5px;
    font-size: 11.5px; font-weight: 700; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .hb-table .points { font-weight: 700; color: var(--ink); white-space: nowrap; }
  .hb-table .points small { display: block; font-weight: 500; color: var(--ink-soft); font-size: 11.5px; margin-top: 2px; }

  .hb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .hb-mini {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow);
  }
  .hb-mini h4 { margin: 0 0 4px; font-size: 14px; color: var(--ink); }
  .hb-mini .role { color: #0a8a55; font-size: 11.5px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .hb-mini .meta-line { color: var(--ink-soft); font-size: 12.5px; margin-top: 4px; }

  .hb-rules {
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px 20px; box-shadow: var(--shadow);
  }
  .hb-rules ul { margin: 0; padding-left: 20px; }
  .hb-rules li { margin-bottom: 7px; line-height: 1.5; }
  .hb-rules li strong { color: var(--ink); }
  .hb-rules .warn-line {
    margin-top: 12px; padding: 10px 12px;
    background: var(--warn-bg); border-left: 3px solid var(--warn);
    border-radius: 0 8px 8px 0; font-size: 13px; color: #6b4503;
  }
  @media (max-width: 740px) {
    .hb-flow { grid-template-columns: 1fr; }
    .hb-table thead { display: none; }
    .hb-table tbody td { display: block; padding: 8px 14px; border-bottom: 0; }
    .hb-table tbody tr { border-bottom: 1px solid var(--line-soft); padding: 8px 0; }
  }

  @media (max-width: 640px) {
    .top-row { padding: 12px 16px; }
    main { padding: 16px 16px 60px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="brand"><span class="wheel"></span>Interact / Rotary Officer Prep</div>
    <span class="sub">Service Above Self &middot; 7 Areas of Focus &middot; 4-Way Test</span>
    <div class="spacer"></div>
    <div class="search">
      <input id="searchbox" placeholder="Search concepts, people, programs..." />
    </div>
  </div>
  <nav class="tabs" id="tabs">
    <div class="tab active" data-tab="concepts">Concepts <span class="count" id="ct-concepts"></span></div>
    <div class="tab" data-tab="people">People &amp; History <span class="count" id="ct-people"></span></div>
    <div class="tab" data-tab="programs">Programs <span class="count" id="ct-programs"></span></div>
    <div class="tab" data-tab="quotes">Quotes &amp; Mottos <span class="count" id="ct-quotes"></span></div>
    <div class="tab" data-tab="quiz">Quiz <span class="count" id="ct-quiz"></span></div>
    <div class="tab" data-tab="interview">Interview <span class="count" id="ct-interview"></span></div>
    <div class="tab" data-tab="highyield">High-Yield</div>
    <div class="tab" data-tab="handbook">Handbook Map</div>
  </nav>
  <div class="chips-row" id="chips-row"></div>
</header>

<main id="root"></main>

<script>
/* ──────────────────────────────────────────────────────────────────
   DATA
   ────────────────────────────────────────────────────────────────── */

const CONCEPTS = [

const INTERVIEW = [
  { id:1, role:"All officers",
    q:"Tell us about yourself in 60 seconds.",
    testing:"Self-editing under pressure. Whether you lead with identity or trivia. Whether you can close cleanly.",
    framework:"3 beats. (1) Identity — grade, school, one defining academic or extracurricular interest. (2) Interact track record — what you've done in the club, with one number. (3) Why you're here — the role you're applying for, plus a one-line preview of your platform. Land hard, no trail-off.",
    sample:"\"Grade 11 IB, biochem track. Member of Interact for 2 years. Last term I led the bottle-cap recycling drive — 1,200 caps collected — and I ran point on the Annapoorna ration drive. I'm here for the Secretary role because documentation is the gap I see in our club, and that's the gap I want to close.\"",
    pitfall:"Don't recite your CV. Don't open with \"I'm passionate.\" Don't run past 60 seconds." },

  { id:2, role:"All officers",
    q:"Why this specific position, and not one of the others?",
    testing:"Whether you've thought about the role, or just want a title.",
    framework:"(1) What the role actually DOES — quote the responsibility in concrete terms. (2) Why the other roles aren't your strongest fit RIGHT NOW. (3) The one specific thing in this role you want to own. Anchors: President = vision + external relationships; VP = execution + ownership; Secretary = memory + continuity; Treasurer = fundraising + accountability.",
    sample:"\"Secretary keeps the club's memory. Right now we lose six months of context every officer handover. I keep clean notes by default — my chem lab books are version-controlled. President needs the charisma I'm still building. Secretary plays to who I am today.\"",
    pitfall:"\"Any role would be fine\" is the wrong answer. Pick one and defend it." },

    q:"What does \"Service Above Self\" actually mean to you — and where have YOU lived it?",

    sample:"\"To me, Service Above Self means: when there's a cost, you absorb it. Last winter I gave up the school trip to Goa to finish the Angola medical-camp documentation — 40 hours of editing over two weekends. The trip mattered; the documentation was the thing 175 children depended on us actually shipping.\"",

  { id:4, role:"All officers",

    framework:"STAR works. (1) A specific failure — not catastrophic, not fake-modest. (2) Take ownership — no blaming teammates or circumstances. (3) The exact change you made after. (4) Evidence the change stuck.",
    sample:"\"At last year's MUN I ran point on logistics and didn't double-check the printer booking — 80 delegates arrived to empty paper trays. I now run a 48-hours-out checklist for every event I lead. The Annapoorna ration drive shipped flawlessly because of that checklist.\"",
    pitfall:"\"My biggest weakness is I work too hard\" is the kiss of death. Don't fake-fail." },

  { id:5, role:"All officers",
    q:"How will you balance Interact responsibilities with IB / Boards workload?",
    testing:"Whether you've thought about your own capacity. Whether you'll burn out by November.",
    framework:"(1) Acknowledge the workload is real — don't bluff. (2) Name your weekly time budget for Interact (e.g. 6 hours, 10 in event weeks). (3) Show how you'll PROTECT it — calendar blocks, pre-event blackout days. (4) Name one IB-overlap risk (IA window, mocks) and how you'll pre-empt it with a named deputy.",
    sample:"\"Six hours a week — Tuesday and Saturday blocks. Pre-event week I scale to ten by cutting screen time, not study time. My IB IAs are due February 15 — that's the window I'll need a deputy to step in, and I'll name that deputy in October, not the night before.\"",
    pitfall:"Don't promise unlimited availability. Don't pretend Interact is your top priority — it's not, and they know." },

  { id:6, role:"President / VP",
    q:"Walk us through your first 90 days if elected.",
    testing:"Whether you can plan. Whether you've thought past the election itself.",
    framework:"Three 30-day blocks. (1) Days 1-30: LISTENING — 1:1 with every member, audit last year's GoSharpener posts, identify the 1-2 problems to fix. (2) Days 31-60: first project shipped — small, fast, visible, team-building. (3) Days 61-90: lock the annual calendar — name the flagship and the international partner. Mention the monthly D3012 posting cadence.",
    sample:"\"Days 1-30: 15-minute 1:1 with every member; audit GoSharpener for what was posted versus attempted. Days 31-60: a Health Care Camp shipped by week 8 — 50 points, an activity we haven't run yet. Days 61-90: full-year calendar published, with our international #UniteToEmpower partner named and signed.\"",

  { id:7, role:"All officers",
    q:"Two members are in serious conflict. One is your close friend. How do you handle it?",

    framework:"(1) Acknowledge the conflict of interest OUT LOUD — don't pretend it doesn't exist. (2) Recuse from arbitration if possible — bring in another officer or the faculty advisor. (3) If you must arbitrate, run the Four-Way Test on YOURSELF, not just the dispute. (4) Close: state what fairness costs you (the friendship's comfort) and that you'll pay it.",
    sample:"\"I'd tell both of them, openly, that one is my close friend and I'm going to recuse from the decision itself. I'd bring in the Vice President or our faculty advisor. If recusal isn't possible, I'd run my proposed decision past one of them BEFORE telling either party. Then I'd own the call — including with my friend.\"",

    q:"Which question of the Four-Way Test do you find HARDEST to apply in real life?",
    testing:"Whether you've actually used the test or just memorised it.",
    framework:"Pick ONE (not \"all four are hard\"). Strong picks: #2 \"Is it fair to all concerned?\" or #4 \"Will it be beneficial to all concerned?\" — both have hidden complexity. Explain the situation where it gets hard and how you reconcile it.",

    pitfall:"Don't pick #1 \"Is it the truth?\" — it makes you sound like you struggle with honesty. Pick a structurally hard one." },

    framework:"(1) The problem — observed locally, not abstract. (2) The project — concrete enough that a member could execute next month. (3) The partner — name a real one (NGO, Rotary club, school). (4) The measurable — what you'd count. (5) The D3012 hashtag it maps to.",

  { id:10, role:"President / VP",
    q:"A flagship project flops at the halfway mark. What's your move?",

    framework:"(1) First 24 hours: stop the bleeding — pause new commitments, gather data, talk to the team. (2) Decide: scope down, pivot, or kill. (3) Communicate honestly — to the club, to the sponsoring Rotary club, to any external partner. (4) Document the failure so the next officer doesn't repeat it. (5) Show no shame about killing it — Four-Way Test #4 is \"beneficial to all\" and a doomed project benefits no one.",
    sample:"\"If we were halfway and impact was zero, I'd kill it within a week — not let it limp through the term. I'd write a one-page post-mortem, share it with the Rotary-club sponsor, and propose what we redirect the volunteer hours to. Killing a bad project is more courageous than finishing it for optics.\"",

    testing:"Whether you can self-advocate without being arrogant.",

    pitfall:"Don't trash other candidates. The concession that they're better at X is what makes the rest credible." },

  { id:12, role:"All officers",
    q:"What's one thing you would CHANGE about how this club currently operates?",
    testing:"Whether you can criticise constructively without alienating the current officers in the room.",
    framework:"(1) Lead with what's WORKING — credit current leadership for one specific thing. (2) Name ONE change — process, not personality. (3) Show why now is the moment for it (new term, new project pipeline). (4) Acknowledge the risk of the change and how you'd mitigate it.",
    sample:"\"The current officers built the strongest social-media presence we've ever had — I'd protect that. What I'd change is the meeting cadence: weekly 30-minute project standups instead of a monthly 2-hour meeting. Faster feedback, less meeting fatigue. The risk is members forget what was decided — I'd send a 5-line written summary after every standup.\"",
    pitfall:"Don't pretend everything is perfect. Don't criticise people in the room. Stay on process." },

  { id:13, role:"Treasurer / VP",
    q:"How would you raise ₹50,000 for our flagship fundraiser this year?",
    testing:"Whether you have a concrete, sequenced plan — or just a wish.",
    framework:"(1) Mix of sources — bake-sale-style retail, corporate sponsorship, alumni outreach, online platform (Milaap / Ketto). (2) Numbers per channel — how each adds up to ₹50K. (3) Timeline — what closes first, what's the back-stop. (4) Cite #FunKaroRaiseKaro tier: above ₹50K is 150 Go Points, below is 75 — the goal sits at the tier-break for a reason.",
    sample:"\"Three channels. Channel 1: bake-and-craft sale at the parent-teacher meet — ₹15K from ~300 parents. Channel 2: two corporate sponsors at ₹10K each via my dad's network and the school's alumni list — ₹20K. Channel 3: a Milaap page run for 30 days with class-wise targets — ₹15K. Total ₹50K, with alumni outreach as the back-stop if Milaap underperforms. We file under #FunKaroRaiseKaro for the 150-point tier.\"",
    pitfall:"Don't say \"we'll figure out funding as we go.\" Don't pitch a number without channels." },

    q:"How will you grow club membership next year?",
    testing:"Whether you understand recruitment is a system, not an event.",
    framework:"Three levers. (1) VISIBILITY — assembly slot, social posts, a recruitment table in the first two weeks of term. (2) ONBOARDING — every new member is on a first project within four weeks. (3) RETENTION — public recognition, officer mentorship, a clear track to next year's officer roles. Cite global scale (14,911 clubs / ~343K Interactors / 145 countries) — you're recruiting into something larger than the school.",
    sample:"\"Visibility: a 5-minute assembly pitch in week 1 plus an Interact table at the school fair. Onboarding: every signup gets paired with an officer and is on a real project (not shadowing) within four weeks. Retention: a public \"Interactor of the month\" shoutout in the school newsletter and a written track to officer roles by end of Grade 11. Target: 30 active members by November, up from 18.\"",
    pitfall:"\"We'll put up posters\" is not a strategy. Show the system." },

  { id:15, role:"All officers",
    q:"Name a Rotary or Interact moment in history that genuinely moved you.",
    testing:"Whether you've engaged with the lore or just memorised dates.",
    framework:"Pick something SPECIFIC, not \"the founding.\" Strong picks: the 1979 Philippines polio drive (seed that became PolioPlus), Sylvia Whitlock becoming the first woman Rotary president in 1987, the 1962 Melbourne Florida charter, the $26.50 that became the Rotary Foundation. Explain WHY it moved you in your own life context.",
    sample:"\"Arch Klumph's $26.50 in 1917. It moved me because nobody in that room believed they were building a foundation that would one day give out billions — they thought they were starting a small fund. It taught me that the size of the first action doesn't predict the size of the eventual impact. That's why I don't dismiss our Grade 9 members' \"small\" projects — the ration drive that funds 50 families this year is somebody's $26.50 a decade from now.\"",
    pitfall:"Don't pick \"the founding\" — too generic. Don't recite a date without the meaning." }

/* ──────────────────────────────────────────────────────────────────
   STATE & RENDER
   ────────────────────────────────────────────────────────────────── */

let state = {
  tab: "concepts",
  filter: "all",
  search: "",
  quiz: null,   // { questions, idx, score, answers }
};

const TAB_ORDER = ["concepts","people","programs","quotes","quiz","interview","highyield","handbook"];

const CONCEPT_CATS = ["all","identity","focus","service","test","symbol","interact"];
const PEOPLE_CATS  = ["all","people","history"];

function el(html){ const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstChild; }

function escapeHtml(s){ return (s||"").replace(/[&<>]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c])); }

function matchSearch(card, q){
  if(!q) return true;
  q = q.toLowerCase();
  const hay = JSON.stringify(card).toLowerCase();
  return hay.indexOf(q) !== -1;
}

function renderChips(){
  const row = document.getElementById("chips-row");
  row.innerHTML = "";
  let cats = null;
  if(state.tab === "concepts") cats = CONCEPT_CATS;
  else if(state.tab === "people") cats = PEOPLE_CATS;
  if(!cats){ row.style.display = "none"; return; }
  row.style.display = "flex";
  row.innerHTML = '<span class="chip-label">Filter</span>' + cats.map(c => {
    const label = c === "all" ? "All" : c[0].toUpperCase()+c.slice(1);
    const active = state.filter === c ? "active" : "";
    return `<span class="chip ${active}" data-cat="${c}">${label}</span>`;
  }).join("");
  row.querySelectorAll(".chip").forEach(ch => {
    ch.onclick = () => { state.filter = ch.dataset.cat; render(); };
  });
}

function renderTabs(){
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === state.tab);
    t.onclick = () => { state.tab = t.dataset.tab; state.filter="all"; state.quiz=null; render(); };
  });
  document.getElementById("ct-concepts").textContent = CONCEPTS.length;
  document.getElementById("ct-people").textContent   = PEOPLE.length;
  document.getElementById("ct-programs").textContent = PROGRAMS.length;
  document.getElementById("ct-quotes").textContent   = QUOTES.length;
  document.getElementById("ct-quiz").textContent     = QUESTIONS.length;
  document.getElementById("ct-interview").textContent = DEBATES.length + INTERVIEW.length;
}

function conceptCard(c){
  const tagLabel = c.cat[0].toUpperCase()+c.cat.slice(1);
  let body = "";
  if(c.summary) body += `<div class="field"><span class="val">${c.summary}</span></div>`;
  if(c.verbatim){
    body += `<div class="verbatim"><span class="lbl-v">Verbatim</span>${escapeHtml(c.verbatim).replace(/\n/g,"<br>")}</div>`;
  }
  if(c.items){
    body += `<div class="field"><span class="lbl">Key</span><ul>${c.items.map(i=>`<li>${i}</li>`).join("")}</ul></div>`;
  }
  if(c.mnemonic) body += `<div class="pull"><strong>Mnemonic:</strong> ${c.mnemonic}</div>`;
  if(c.pull) body += `<div class="pull">${c.pull}</div>`;
  if(c.why) body += `<div class="field"><span class="lbl">Why it matters</span><span class="val">${c.why}</span></div>`;
  if(c.related) body += `<div class="related">↳ ${c.related}</div>`;
  return `<div class="card cat-${c.cat}">
    <div class="meta"><span class="tag ${c.cat}">${tagLabel}</span></div>
    <h3>${c.title}</h3>
    ${body}
  </div>`;
}

function personCard(p){
  let body = "";
  if(p.role)    body += `<div class="field"><span class="lbl">Role</span><span class="val">${p.role}</span></div>`;
  if(p.dates)   body += `<div class="field"><span class="lbl">Dates</span><span class="val">${p.dates}</span></div>`;
  if(p.summary) body += `<div class="field"><span class="val">${p.summary}</span></div>`;
  if(p.pull)    body += `<div class="pull">${p.pull}</div>`;
  if(p.why)     body += `<div class="field"><span class="lbl">Why care</span><span class="val">${p.why}</span></div>`;
  const tagLabel = p.cat[0].toUpperCase()+p.cat.slice(1);
  return `<div class="card cat-${p.cat}">
    <div class="meta"><span class="tag ${p.cat}">${tagLabel}</span></div>
    <h3>${p.title}</h3>
    ${body}
  </div>`;
}

function programCard(p){
  let body = "";
  if(p.audience) body += `<div class="field"><span class="lbl">Audience</span><span class="val">${p.audience}</span></div>`;
  if(p.summary)  body += `<div class="field"><span class="val">${p.summary}</span></div>`;
  if(p.items)    body += `<div class="field"><span class="lbl">Details</span><ul>${p.items.map(i=>`<li>${i}</li>`).join("")}</ul></div>`;
  if(p.pull)     body += `<div class="pull">${p.pull}</div>`;
  if(p.why)      body += `<div class="field"><span class="lbl">Why care</span><span class="val">${p.why}</span></div>`;
  return `<div class="card cat-program">
    <div class="meta"><span class="tag program">Program</span></div>
    <h3>${p.title}</h3>
    ${body}
  </div>`;
}

function quoteCard(q){
  return `<div class="card cat-quote">
    <div class="meta"><span class="tag quote">Quote</span></div>
    <h3>${q.title}</h3>
    <div class="verbatim"><span class="lbl-v">${escapeHtml(q.attribution)}</span>"${escapeHtml(q.text)}"</div>
    ${q.note ? `<div class="field"><span class="lbl">Use it</span><span class="val">${q.note}</span></div>` : ""}
  </div>`;
}

function renderGrid(items, fmt){
  const list = items.filter(c => matchSearch(c, state.search))
                    .filter(c => state.filter==="all" || c.cat===state.filter);
  if(list.length === 0){
    return `<div class="placeholder"><h3>No matches.</h3><div>Try a different filter or search term.</div></div>`;
  }
  return `<div class="grid">${list.map(fmt).join("")}</div>`;
}

function renderConcepts(){
  return `<div class="summary-bar"><h2>Concepts <span class="sublabel">— the canonical material every Interact officer should know</span></h2></div>
          ${renderGrid(CONCEPTS, conceptCard)}`;
}
function renderPeople(){
  return `<div class="summary-bar"><h2>People &amp; History <span class="sublabel">— the founders, the ethicists, the milestones</span></h2></div>
          ${renderGrid(PEOPLE, personCard)}`;
}
function renderPrograms(){
  return `<div class="summary-bar"><h2>Programs &amp; Initiatives <span class="sublabel">— the Rotary family of programs</span></h2></div>
          <div class="grid">${PROGRAMS.filter(c=>matchSearch(c,state.search)).map(programCard).join("")}</div>`;
}
function renderQuotes(){
  return `<div class="summary-bar"><h2>Quotes &amp; Mottos <span class="sublabel">— interview-ready lines, attributed and verbatim</span></h2></div>
          <div class="grid">${QUOTES.filter(c=>matchSearch(c,state.search)).map(quoteCard).join("")}</div>`;
}

function renderHighYield(){
  let html = `<div class="summary-bar"><h2>High-Yield <span class="sublabel">— the night-before crib sheet</span></h2></div>`;
  html += `<div class="hy-card"><h3>The Punch List (memorise all 15)</h3><ol>${HIGHYIELD.punch.map(p=>`<li>${p}</li>`).join("")}</ol></div>`;
  html += `<div class="hy-card"><h3>One-Sentence Answers (rehearse aloud)</h3>`;
  html += HIGHYIELD.fast.map(f => `<div style="margin-bottom:14px;"><strong style="color:var(--rblue);">Q. ${f.q}</strong><br><span>A. ${f.a}</span></div>`).join("");
  html += `</div>`;
  return html;
}

  return `<div class="card cat-debate">
    <div class="meta">
      <span class="tag debate">Debate</span>
      <span class="tag role">${d.cat}</span>

    <div class="debate-split">
      <div class="debate-side for">
        <h5>For the motion</h5>
        <ul>${d.for.map(p=>`<li>${p}</li>`).join("")}</ul>

        <h5>Against the motion</h5>
        <ul>${d.against.map(p=>`<li>${p}</li>`).join("")}</ul>

function interviewCard(iv){

function renderInterviewPrep(){
  const dList = DEBATES.filter(d => matchSearch(d, state.search));

  </div>`;

  const internship = `<div class="hb-section">
    <h3>GoSharpener Global Internship Program</h3>
    <div class="hb-rules">
      <ul>${hb.internship.map(i=>`<li>${i}</li>`).join("")}</ul>
    </div>
  </div>`;

  const handbooks = `<div class="hb-section">
    <h3>Official Interact Handbooks (PDF)</h3>
    <div class="hb-rules">
      <p style="margin:0 0 10px;">Content from both of these handbooks has been integrated across the <strong>Concepts</strong>, <strong>Programs</strong>, <strong>Quotes</strong>, and <strong>Quiz</strong> tabs — including the 9 constitutional goals, the seven-step chartering process, the service-learning framework, the four standing committees, the Citation goals, and the constitutional attendance / meeting / quorum rules.</p>
      <ul>
        <li><a href="https://clubrunner.blob.core.windows.net/00000050043/en-ca/files/homepage/interact-guide-for-interactors/interact-handbook-guide-for-interactors-en-1.pdf" target="_blank" rel="noopener"><strong>Interact Handbook — Guide for Interactors</strong></a> (Rotary International, current edition). Covers starting a club, safety &amp; inclusion, electing officers, service-learning, promoting your club, district support, and the Rotary Citation for Interact Clubs.</li>
        <li><a href="https://rotary.org.pl/wp-content/uploads/2019/03/interact-handbook.pdf" target="_blank" rel="noopener"><strong>Interact Handbook</strong></a> (Rotary International, 2007 edition · Rotary Poland mirror). Contains the full <strong>Standard Interact Club Constitution &amp; Bylaws</strong>, officer duties, the six-step club-formation checklist, and the Rotary Calendar of Observances.</li>
      </ul>
    </div>
  </div>`;

  const sources = `<div class="hb-section">
    <h3>Other Canonical Sources Behind This Prep</h3>
    <div class="hb-rules">
      <ul>
        <li>rotary.org/en/our-causes (7 Areas of Focus)</li>
        <li>rotary.org/en/get-involved/interact-clubs (Interact scale &amp; rules)</li>
        <li>rotary.org/en/about-rotary (mission, vision, scale)</li>
        <li>rotary.org/en/history-1962-interact-takes-action (Interact founding)</li>
        <li>rotary.org/en/history-first-four-rotarians (founders)</li>
        <li>rotary.org/en/history-how-rotary-emblem-evolved (wheel symbolism)</li>
      </ul>
    </div>
  </div>`;

  return `<div class="summary-bar">
    <h2>Handbook Map <span class="sublabel">— District 3012 point system, contacts &amp; deadlines</span></h2>
  </div>
  ${banner}
  ${flow}
  ${rules}
  ${activities}
  ${leaders}
  ${internship}
  ${handbooks}
  ${sources}`;
}

/* ─── Quiz ────────────────────────────────────────────────────── */

function renderQuiz(){
  if(!state.quiz){
    return `<div class="summary-bar"><h2>Quiz <span class="sublabel">— drill until it's automatic</span></h2></div>
    <div class="quiz-setup">
      <h3>Pick your run</h3>
      <div class="quiz-row">
        <span class="qlbl">Category</span>
        <span class="chips">
          ${["all","identity","focus","service","test","interact","history","program","handbook"].map(c =>
            `<span class="chip ${state.quizCat===c?'active':''}" data-qcat="${c}">${c==='all'?'All':c[0].toUpperCase()+c.slice(1)}</span>`
          ).join("")}
        </span>
      </div>
      <div class="quiz-row">
        <span class="qlbl">Difficulty</span>
        <span class="chips">
          ${["all","easy","medium","hard","officer"].map(d =>
            `<span class="chip ${state.quizDiff===d?'active':''}" data-qdiff="${d}">${d==='all'?'All':d[0].toUpperCase()+d.slice(1)}</span>`
          ).join("")}
        </span>
      </div>
      <div class="quiz-row">
        <span class="qlbl">Length</span>
        <span class="chips">
          ${[10,20,"All"].map(n =>
            `<span class="chip ${state.quizLen===n?'active':''}" data-qlen="${n}">${n}</span>`
          ).join("")}
        </span>
      </div>
      <div style="margin-top:18px;">
        <button class="btn" id="quiz-start">Start quiz</button>
      </div>
    </div>`;
  }

  const q = state.quiz.questions[state.quiz.idx];
  if(!q){
    return renderQuizResult();
  }
  const total = state.quiz.questions.length;
  const prog = ((state.quiz.idx)/total*100).toFixed(0);
  const answered = state.quiz.answers[state.quiz.idx];

  let choicesHtml = "";
  if(q.type==="mcq"){
    choicesHtml = `<div class="qchoices">${q.choices.map((c,i)=>{
      let cls = "qchoice";
      if(answered !== undefined){
        if(i === q.ans) cls += " right";
        else if(i === answered) cls += " wrong";
      } else if(state.quiz.selected === i) cls += " selected";
      return `<button class="${cls}" data-c="${i}"><span class="qletter">${String.fromCharCode(65+i)}</span><span>${c}</span></button>`;
    }).join("")}</div>`;
  } else {
    // free-response
    choicesHtml = `<div class="qfr">
      <strong>Answer framework:</strong> ${q.framework}
      ${q.sample ? `<div style="margin-top:10px;"><strong>Coaching:</strong> ${q.sample}</div>` : ""}
    </div>`;
  }

  let expl = "";
  if(answered !== undefined && q.type==="mcq"){
    expl = `<div class="qexpl"><strong>${answered===q.ans?'Correct.':'Not quite.'}</strong> ${q.expl}</div>`;
  }

  return `<div class="summary-bar"><h2>Quiz <span class="sublabel">— ${state.quiz.idx+1} of ${total}</span></h2></div>
  <div class="quiz-card">
    <div class="qhead">
      <span class="qnum">Q${state.quiz.idx+1}</span>
      <span class="tag diff-${q.diff}">${q.diff}</span>
      <span class="tag ${q.cat}">${q.cat}</span>
      <span class="tag type-${q.type}">${q.type==="mcq"?"MCQ":"Free response"}</span>
      <div class="qprog"><div style="width:${prog}%"></div></div>
      <span class="qstreak">Score: ${state.quiz.score}/${state.quiz.idx + (answered!==undefined?1:0)}</span>
    </div>
    <div class="qprompt">${q.q}</div>
    ${choicesHtml}
    ${expl}
    <div class="qactions">
      <button class="btn ghost" id="quiz-exit">Exit quiz</button>
      <button class="btn" id="quiz-next">${state.quiz.idx === total-1 ? "Finish" : "Next →"}</button>
    </div>
  </div>`;
}

function renderQuizResult(){
  const total = state.quiz.questions.length;
  const score = state.quiz.score;
  const pct = total === 0 ? 0 : Math.round((score/total)*100);

  // Category breakdown
  const byCat = {};
  state.quiz.questions.forEach((q,i)=>{
    if(q.type !== "mcq") return;
    byCat[q.cat] = byCat[q.cat] || { total:0, right:0 };
    byCat[q.cat].total++;
    if(state.quiz.answers[i] === q.ans) byCat[q.cat].right++;
  });

  let breakdown = "";
  Object.keys(byCat).sort().forEach(cat => {
    const c = byCat[cat];
    breakdown += `<tr><td>${cat[0].toUpperCase()+cat.slice(1)}</td><td>${c.right}/${c.total}</td><td>${Math.round(c.right/c.total*100)}%</td></tr>`;
  });

  return `<div class="summary-result">
    <h3>Quiz complete</h3>
    <div class="score">${score}<span style="font-size:24px;color:var(--ink-mute);font-weight:600;"> / ${total}</span></div>
    <div class="score-sub">${pct}% — ${pct>=80?'Officer-ready.': pct>=60?'Solid base. Drill the weak categories.':'Cycle through Concepts and High-Yield again.'}</div>
    ${breakdown ? `<table><thead><tr><th>Category</th><th>Score</th><th>%</th></tr></thead><tbody>${breakdown}</tbody></table>` : ''}
    <div style="margin-top:18px; display:flex; gap:10px;">
      <button class="btn" id="quiz-restart">New quiz</button>
      <button class="btn ghost" id="quiz-exit">Back to setup</button>
    </div>
  </div>`;
}

function setupQuizHandlers(){
  document.querySelectorAll("[data-qcat]").forEach(c => c.onclick = ()=>{ state.quizCat = c.dataset.qcat; render(); });
  document.querySelectorAll("[data-qdiff]").forEach(c => c.onclick = ()=>{ state.quizDiff = c.dataset.qdiff; render(); });
  document.querySelectorAll("[data-qlen]").forEach(c => c.onclick = ()=>{ state.quizLen = c.dataset.qlen === "All" ? "All" : parseInt(c.dataset.qlen); render(); });

  const start = document.getElementById("quiz-start");
  if(start) start.onclick = () => {
    let pool = QUESTIONS.filter(q=>{
      if(state.quizCat && state.quizCat!=="all" && q.cat !== state.quizCat) return false;
      if(state.quizDiff && state.quizDiff!=="all" && q.diff !== state.quizDiff) return false;
      return true;
    });
    // shuffle
    pool = pool.slice().sort(()=>Math.random()-0.5);
    let n = state.quizLen === "All" ? pool.length : Math.min(state.quizLen || 10, pool.length);
    if(n === 0){
      alert("No questions match those filters. Loosen the filters.");
      return;
    }
    state.quiz = { questions: pool.slice(0,n), idx:0, score:0, answers:[], selected:null };
    render();
  };

  document.querySelectorAll(".qchoice").forEach(btn => {
    btn.onclick = () => {
      const q = state.quiz.questions[state.quiz.idx];
      if(state.quiz.answers[state.quiz.idx] !== undefined) return; // already answered
      const choice = parseInt(btn.dataset.c);
      state.quiz.answers[state.quiz.idx] = choice;
      if(choice === q.ans) state.quiz.score++;
      render();
    };
  });

  const next = document.getElementById("quiz-next");
  if(next) next.onclick = () => {
    const q = state.quiz.questions[state.quiz.idx];
    if(q.type==="mcq" && state.quiz.answers[state.quiz.idx] === undefined){
      // not answered yet — skip the question
      state.quiz.answers[state.quiz.idx] = -1;
    }
    state.quiz.idx++;
    render();
  };

  const exit = document.getElementById("quiz-exit");
  if(exit) exit.onclick = () => { state.quiz = null; render(); };
  const restart = document.getElementById("quiz-restart");
  if(restart) restart.onclick = () => { state.quiz = null; render(); };
}

function render(){
  renderTabs();
  renderChips();
  const root = document.getElementById("root");
  switch(state.tab){
    case "concepts":  root.innerHTML = renderConcepts(); break;
    case "people":    root.innerHTML = renderPeople(); break;
    case "programs":  root.innerHTML = renderPrograms(); break;
    case "quotes":    root.innerHTML = renderQuotes(); break;
    case "quiz":      root.innerHTML = renderQuiz(); setupQuizHandlers(); break;
    case "interview": root.innerHTML = renderInterviewPrep(); break;
    case "highyield": root.innerHTML = renderHighYield(); break;
    case "handbook":  root.innerHTML = renderHandbook(); break;
  }
}

document.getElementById("searchbox").addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

// keyboard shortcuts in quiz
document.addEventListener("keydown", e => {
  if(state.tab !== "quiz" || !state.quiz) return;
  const q = state.quiz.questions[state.quiz.idx];
  if(!q) return;
  if(q.type==="mcq" && /^[a-d]$/i.test(e.key)){
    const idx = e.key.toUpperCase().charCodeAt(0) - 65;
    if(idx < q.choices.length && state.quiz.answers[state.quiz.idx] === undefined){
      state.quiz.answers[state.quiz.idx] = idx;
      if(idx === q.ans) state.quiz.score++;
      render();
    }
  } else if(e.key === "Enter"){
    document.getElementById("quiz-next")?.click();
  }
});

render();
</script>
